<header>
    <h1 id="titleMain">Твій план на день</h1>
    <p>Організуй свій день ефективно</p>
</header>
<div class="controls">
    <button id="searchButton"><i data-lucide="search"></i></button>
    <input type="text" id="task" placeholder="Додати задачу...">

<button id="AddText">
    <i data-lucide="Plus"></i>

</button></div>
<div class="filterContainer">
    <button id="buttonAll">Усі</button>
    <button id="buttonCompleted">Виконані</button>
    <button id="buttonActive">Активні</button>
</div>
<div id="toastContainer"></div>

<ol>

</ol>   
<h2 id="searchNull" class="hidden">Нічого не знайдено</h2>



<div id="confirmModal" class="modal hidden">
    <div class="modal-content">
        <p id="modalText">Вы уверены?</p>
        <div class="modal-buttonConfirm">
            <button id="confirmYes">Так</button>
            <button id="confirmNo">Ні</button>
        </div>
        
    </div>
</div>

<div id="editModal" class="modal hidden">
    <div class="modal-content">
        <p id="editModalText">Введіть новий текст:</p>
        <div class="edit-input"><input type="text" id="editInput"></div>
        <div class="modal-buttonEdit">
            <button id="editButton">Змінити</button>
            <button id="leaveButton">Вийти</button>
        </div>
        
    </div>
</div>
<div id="modalDuplicate" class="modal hidden">
    <div class="modal-content">
        <p id="duplicateConfirmText">Ця задача вже існує!</p>
        <div class="Ok-Button">
            <button id="OKButton">OK</button>
        </div>
    </div>
</div>

<div id="ModalComplete" class="modal hidden">
    <div class="modal-content">
        <p id="modalTextComplete">Вы уверены?</p>
        <div class="modal-buttonComplete">
            <button id="completeYes">Так</button>
            <button id="completeNo">Ні</button>
        </div>
        
    </div>
</div>

</div>
    <!-- <script src="js/main.js"></script> -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="js/main.js"></script>

</html>
